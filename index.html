<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDFC First Bank - Modern Trip Planning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            red: {
              50: '#fef2f2',
              100: '#fde3e5',
              200: '#fbc8cc',
              300: '#f7a0a7',
              400: '#ef6a74',
              500: '#d93a47',
              600: '#9D1D27', // Primary IDFC First Bank Brand Maroon
              700: '#861921',
              800: '#6e151c',
              900: '#5a1319',
              950: '#33080c',
            },
            brand: {
              red: '#9D1D27',
              maroon: '#9D1D27',
              gold: '#C4953A',
            },
            amber: {
              400: '#C4953A', // Mapping amber-400 to IDFC First Bank Gold for consistency
              500: '#C4953A', // IDFC First Bank Gold
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html,
    body,
    #root {
      height: 100%;
      min-height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom scrollbar for a cleaner UI */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .dark::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .mc-gradient {
      background: linear-gradient(135deg, #9D1D27 0%, #B8342E 50%, #C4953A 100%);
    }

    .mc-gradient-text {
      background: linear-gradient(135deg, #9D1D27 0%, #B8342E 50%, #C4953A 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mc-gradient-border {
      border-image: linear-gradient(135deg, #9D1D27 0%, #B8342E 50%, #C4953A 100%) 1;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.26.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
